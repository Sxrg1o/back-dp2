[tool:pytest]
# Configuración de pytest para el proyecto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marcadores personalizados
markers =
    unit: Tests unitarios
    integration: Tests de integración
    api: Tests de API endpoints
    slow: Tests que tardan más tiempo
    menu: Tests del módulo Menu y Carta
    pedidos: Tests del módulo Gestión de Pedidos

# Opciones de salida
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Configuración de logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filtros de warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:fastapi.*

# Configuración de coverage (si se usa)
# addopts = --cov=app --cov-report=html --cov-report=term-missing
